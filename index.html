<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Registro de Serviço</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#edf2f7;
    padding:25px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:25px;
}

h2{
    margin-top:25px;
    margin-bottom:15px;
    color:#003366;
    border-bottom:2px solid #ddd;
    padding-bottom:5px;
}

.grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.grid4{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}

input[type=text],
input[type=date],
input[type=time]{

    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

.radio{
    display:flex;
    gap:30px;
    margin-top:10px;
}

button{

    width:100%;
    margin-top:25px;
    padding:15px;
    background:#003366;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;

}

button:hover{
    background:#00509d;
}

#resumo{

    display:none;
    margin-top:30px;
    padding:20px;
    border-radius:10px;
    background:#f7f7f7;
    border-left:6px solid #003366;
    line-height:1.9;

}

table{

    width:100%;
    margin-top:30px;
    border-collapse:collapse;

}

th{

    background:#003366;
    color:white;

}

th,td{

    border:1px solid #ccc;
    padding:10px;
    text-align:center;

}

/* =========================
   RESPONSIVO MOBILE
========================= */

@media (max-width: 768px){

    body{
        padding:10px;
    }

    .card{
        padding:15px;
    }

    h1{
        font-size:20px;
    }

    h2{
        font-size:16px;
    }

    .grid2,
    .grid4{
        grid-template-columns:1fr;
    }

    input{
        font-size:16px;
        padding:12px;
    }

    button{
        font-size:16px;
        padding:14px;
    }

    table{
        font-size:12px;
        display:block;
        overflow-x:auto;
        white-space:nowrap;
    }

    #resumo{
        font-size:14px;
        line-height:1.6;
    }
}    
    
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>REGISTRO DE SERVIÇO</h1>

<div class="grid2">

<div>

<label>Data</label>

<input type="date" id="data">

</div>

<div>

<label>Equipe</label>

<input type="text" id="equipe">

</div>

<div>
    
<div>

<label>Motorista</label>

<input type="text" id="motorista">

</div>

<div>

<label>Segurança</label>

<input type="text" id="seguranca">

</div>

<div>

<label>Placa</label>

<input type="text" id="placa">

</div>

</div>

<h2>Deslocamento</h2>

<div class="grid4">

<div>

<label>KM Inicial</label>

<input
type="text"
inputmode="numeric"
pattern="[0-9]*"
maxlength="6"
oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)">

</div>

<div>

<label>Hora Inicial</label>

<input type="time" id="horaInicioDesloc">

</div>

<div>

<label>KM Final</label>

<input
type="text"
inputmode="numeric"
pattern="[0-9]*"
maxlength="6"
oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)">

</div>

<div>

<label>Hora Final</label>

<input type="time"
id="horaFinalDesloc">

</div>

</div>

<h2>Tipo de Serviço</h2>

<div class="radio">

<label>

<input
type="radio"
name="tipo"
value="Escolta"
checked>

Escolta

</label>

<label>

<input
type="radio"
name="tipo"
value="Preservação">

Preservação

</label>

</div>

<h2>Serviço</h2>

<div class="grid4">

<div>

<label>KM Inicial</label>

<input
type="text"
inputmode="numeric"
pattern="[0-9]*"
maxlength="6"
oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)">

</div>

<div>

<label>Hora Inicial</label>

<input
type="time"
id="horaInicioServico">

</div>

<div>

<label>KM Final</label>

<input
type="text"
inputmode="numeric"
pattern="[0-9]*"
maxlength="6"
oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)">

</div>

<div>

<label>Hora Final</label>

<input
type="time"
id="horaFinalServico">

</div>

</div>

<button onclick="salvarRegistro()">

Salvar Registro

</button>

<div id="resumo"></div>

<table>

<thead>

<tr>

<th>Data</th>
<th>Motorista</th>
<th>Segurança</th>
<th>Tipo</th>
<th>KM Total</th>

</tr>

</thead>

<tbody id="tbody">
</tbody>

</table>

</div>

</div>

<script>

function formatarKm(km){

    km = km.toString().replace(/\D/g,'');

    return km.padStart(6,'0');

}

function salvarRegistro(){

    let data=document.getElementById("data").value;

    let equipe=document.getElementById("equipe").value;

    let motorista=document.getElementById("motorista").value;

    let seguranca=document.getElementById("seguranca").value;

    let placa=document.getElementById("placa").value.toUpperCase();

    let kmInicioDesloc=formatarKm(document.getElementById("kmInicioDesloc").value);

    let kmFinalDesloc=formatarKm(document.getElementById("kmFinalDesloc").value);

    let horaInicioDesloc=document.getElementById("horaInicioDesloc").value;

    let horaFinalDesloc=document.getElementById("horaFinalDesloc").value;

    let kmInicioServico=formatarKm(document.getElementById("kmInicioServico").value);

    let kmFinalServico=formatarKm(document.getElementById("kmFinalServico").value);

    let horaInicioServico=document.getElementById("horaInicioServico").value;

    let horaFinalServico=document.getElementById("horaFinalServico").value;

    let tipo=document.querySelector('input[name="tipo"]:checked').value;

    let kmTotal=parseInt(kmFinalDesloc)-parseInt(kmInicioDesloc);

    document.getElementById("tbody").innerHTML += `

<tr>

<td>${data}</td>

<td>${motorista}</td>

<td>${seguranca}</td>

<td>${tipo}</td>

<td>${kmTotal} km</td>

</tr>

`;

    let resumo=document.getElementById("resumo");

    resumo.style.display="block";

    resumo.innerHTML=`

<h2 style="margin-top:0;">RESENHA DE SERVIÇO</h2>

<strong>Data:</strong> ${data}

<br><br>

Seg: ${seguranca} / Mot: ${motorista} / Placa: ${placa}

<br><br>

<strong>Tipo:</strong> ${tipo}

<br><br>

Início do deslocamento / KM ${kmInicioDesloc} / ${horaInicioDesloc}

<br><br>

Início da ${tipo.toLowerCase()} / KM ${kmInicioServico} / ${horaInicioServico}
<br><br>

Final da ${tipo.toLowerCase()} / KM ${kmFinalServico} / ${horaFinalServico}

<br><br>

Final do deslocamento / KM ${kmFinalDesloc} / ${horaFinalDesloc}

<br><br>

<strong>KM Total Percorrido:</strong> ${kmTotal} km

`;

}

function imprimirResenha(){

    var conteudo=document.getElementById("resumo").innerHTML;

    var tela=window.open("","","width=900,height=700");

    tela.document.write(`
        <html>
        <head>
            <title>Resenha de Serviço</title>
            <style>

            body{
                font-family:Arial;
                padding:40px;
                font-size:18px;
                line-height:2;
            }

            h2{
                color:#003366;
            }

            </style>
        </head>

        <body>

        ${conteudo}

        </body>

        </html>
    `);

    tela.document.close();

    tela.print();

}

function limparFormulario(){

    document.querySelectorAll("input[type=text],input[type=date],input[type=time]").forEach(function(campo){

        campo.value="";

    });

    document.querySelector('input[value="Escolta"]').checked=true;

}

</script>

<div style="margin-top:20px;display:flex;gap:10px;">

<button onclick="imprimirResenha()" style="flex:1;background:#198754;">
🖨️ Imprimir Resenha
</button>

<button onclick="limparFormulario()" style="flex:1;background:#6c757d;">
🧹 Limpar
</button>

</div>

</body>

</html>
