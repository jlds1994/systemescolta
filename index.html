<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema de Serviço</title>

<style>

body{
    font-family:Arial;
    background:#eef2f7;
    padding:15px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#003366;
}

h2{
    margin-top:20px;
    color:#003366;
    border-bottom:1px solid #ddd;
    padding-bottom:5px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

.grid4{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    background:#003366;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button:hover{
    background:#00509d;
}

.radio{
    display:flex;
    gap:20px;
    margin-top:10px;
}

#resumo{
    display:none;
    margin-top:20px;
    padding:15px;
    background:#f7f7f7;
    border-left:5px solid #003366;
    line-height:1.8;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th{
    background:#003366;
    color:#fff;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
    font-size:14px;
}

/* MOBILE */
@media(max-width:768px){
    .grid4{
        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>REGISTRO DE SERVIÇO</h1>

<label>Data</label>
<input type="text" id="data" placeholder="dd/mm/aaaa">

<label>Motorista</label>
<input type="text" id="motorista">

<label>Segurança</label>
<input type="text" id="seguranca">

<label>Placa</label>
<input type="text" id="placa">

<h2>Deslocamento</h2>

<div class="grid4">

<div>
<label>KM Início</label>
<input type="text" id="kmInicioDesloc" maxlength="6" oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)">
</div>

<div>
<label>Hora</label>
<input type="text" id="horaInicioDesloc" placeholder="HH:MM">
</div>

<div>
<label>KM Final</label>
<input type="text" id="kmFinalDesloc" maxlength="6" oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)">
</div>

<div>
<label>Hora</label>
<input type="text" id="horaFinalDesloc" placeholder="HH:MM">
</div>

</div>

<h2>Tipo</h2>

<div class="radio">

<label><input type="radio" name="tipo" value="Escolta" checked> Escolta</label>
<label><input type="radio" name="tipo" value="Preservação"> Preservação</label>

</div>

<h2>Serviço</h2>

<div class="grid4">

<div>
<label>KM Início</label>
<input type="text" id="kmInicioServico" maxlength="6" oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)">
</div>

<div>
<label>Hora</label>
<input type="text" id="horaInicioServico" placeholder="HH:MM">
</div>

<div>
<label>KM Final</label>
<input type="text" id="kmFinalServico" maxlength="6" oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)">
</div>

<div>
<label>Hora</label>
<input type="text" id="horaFinalServico" placeholder="HH:MM">
</div>

</div>

<button onclick="salvar()">Salvar Registro</button>

<div id="resumo"></div>

<h2>HISTÓRICO</h2>

<table>
<thead>
<tr>
<th>Data</th>
<th>Motorista</th>
<th>Segurança</th>
<th>Tipo</th>
<th>KM Total</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

</div>

</div>

<script>

let registros = JSON.parse(localStorage.getItem("registros") || "[]");

function salvar(){

let data = document.getElementById("data").value || "";
let motorista = document.getElementById("motorista").value || "";
let seguranca = document.getElementById("seguranca").value || "";
let placa = document.getElementById("placa").value || "";

let kmIni = parseInt(document.getElementById("kmInicioDesloc").value || "0");
let kmFim = parseInt(document.getElementById("kmFinalDesloc").value || "0");

let kmTotal = kmFim - kmIni;
if(isNaN(kmTotal) || kmTotal < 0) kmTotal = 0;

let tipo = document.querySelector('input[name="tipo"]:checked')?.value || "";

let registro = {
    data,
    motorista,
    seguranca,
    placa,
    tipo,
    kmTotal
};

registros.push(registro);
localStorage.setItem("registros", JSON.stringify(registros));

carregarHistorico();

document.getElementById("resumo").style.display="block";

document.getElementById("resumo").innerHTML = `
<h2>RESENHA DE SERVIÇO</h2>

Seg: ${seguranca} / Mot: ${motorista} / Placa: ${placa}<br><br>

Tipo: ${tipo}<br><br>

Início do deslocamento / KM ${kmIni}<br><br>

Final do deslocamento / KM ${kmFim}<br><br>

KM Total: ${kmTotal}
`;

}

function carregarHistorico(){

let tabela = document.getElementById("tabela");

tabela.innerHTML = "";

registros.forEach(r => {

tabela.innerHTML += `
<tr>
<td>${r.data}</td>
<td>${r.motorista}</td>
<td>${r.seguranca}</td>
<td>${r.tipo}</td>
<td>${r.kmTotal}</td>
</tr>
`;

});

}

carregarHistorico();

</script>

</body>
</html>
